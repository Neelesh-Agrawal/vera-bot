name: Keep bot warm

# Prevents Render/Railway free-tier cold starts during the judging window.
# Setup: GitHub repo → Settings → Secrets → Actions → BOT_PUBLIC_URL
#        e.g. https://vera-bot.onrender.com

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthz
        env:
          BOT_URL: ${{ secrets.BOT_PUBLIC_URL }}
        run: |
          if [ -z "$BOT_URL" ]; then
            echo "Set BOT_PUBLIC_URL secret to your deployed bot URL"
            exit 0
          fi
          curl -sf --retry 3 --retry-delay 10 --max-time 60 \
            "${BOT_URL%/}/v1/healthz" | head -c 500
          echo ""
          echo "ok"
