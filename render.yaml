# Render.com — use Starter ($7/mo) for zero cold starts, OR free + GitHub keepalive.
services:
  - type: web
    name: vera-bot
    runtime: node
    # plan: starter   # uncomment for always-on (recommended for judge testing)
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /v1/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: qwen/qwen3.6-27b
      - key: WARMUP_LLM
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: TEAM_NAME
        sync: false
      - key: TEAM_MEMBER
        sync: false
      - key: CONTACT_EMAIL
        sync: false
